<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker Mobile Mockups</title>
    <style>
      :root {
        color: #172033;
        background: #f5f6f8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(100%, 460px);
        margin: 0 auto;
        padding: 20px 14px 40px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 18px;
        color: #5f6b7a;
        line-height: 1.6;
      }

      section {
        margin-bottom: 26px;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #d9e0e8;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>モバイル版モック</h1>
      <p>3案を縦に並べています。気に入った案の番号を教えてください。</p>

      <section>
        <h2>1. Balance First</h2>
        <img src="/mockups/01-balance-first.png" alt="Balance First mockup" />
      </section>

      <section>
        <h2>2. Fast Entry Ledger</h2>
        <img src="/mockups/02-fast-entry-ledger.png" alt="Fast Entry Ledger mockup" />
      </section>

      <section>
        <h2>3. Monthly Review</h2>
        <img src="/mockups/03-monthly-review.png" alt="Monthly Review mockup" />
      </section>
    </main>
  </body>
</html>
